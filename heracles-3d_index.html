<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heracles wrestling the Nemean Lion</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fcfbfa; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>

    <model-viewer 
        src="heracles.glb" 
        camera-controls 
        auto-rotate 
        interaction-prompt="none"
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
